name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -e ".[uim,png]" pytest
      - name: Run Python tests
        run: python -m pytest -q

  portable-core:
    name: Portable core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DNEEH_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Run C and C++ host tests
        run: ctest --test-dir build --build-config Release --output-on-failure
      - name: Verify install surface
        run: cmake --install build --prefix "${{ runner.temp }}/neeh-sdk"
